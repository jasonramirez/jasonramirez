# Render Blueprint for the jasonramirez Rails app
# Docs: https://render.com/docs/blueprint-spec
#
# Migrated from Heroku. Maps:
#   web dyno     -> web service (Puma)
#   release task -> preDeployCommand (rails db:migrate)
#   Heroku PG    -> Render Postgres (enable pgvector: CREATE EXTENSION vector;)
#
# Worker and Redis intentionally omitted: no app/channels (Action Cable unused)
# and no configured queue adapter (Active Job defaults to :async, in-process).
#
# After first deploy, open a shell on the web service and run once:
#   bin/rails runner "ActiveRecord::Base.connection.execute('CREATE EXTENSION IF NOT EXISTS vector')"
# (or psql into the DB and run: CREATE EXTENSION IF NOT EXISTS vector;)

databases:
  - name: jasonramirez-db
    databaseName: jasonramirez_production
    plan: basic-256mb        # pgvector requires a paid plan (not free). Bump as needed.
    postgresMajorVersion: "17"   # match local source DB (17.9) — can't restore v17 dump into v16

services:
  # ---------------------------------------------------------------------------
  # Web (Puma)
  # ---------------------------------------------------------------------------
  - type: web
    name: jasonramirez-web
    runtime: ruby
    plan: starter            # preDeployCommand requires a paid instance type
    branch: main
    buildCommand: "./bin/render-build.sh"
    preDeployCommand: "bundle exec rails db:migrate"
    startCommand: "bundle exec puma -C ./config/puma.rb"
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jasonramirez-db
          property: connectionString
      - key: RAILS_ENV
        value: production
      - key: RACK_ENV
        value: production
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: WEB_CONCURRENCY
        value: "2"
      - key: RAILS_MAX_THREADS
        value: "3"
      - key: MAX_THREADS
        value: "3"
      - key: SECRET_KEY_BASE
        generateValue: true
      # --- Secrets: set values in the Render dashboard (sync: false = prompt).
      #     Only vars actually referenced in the code are listed. ---
      # AI (OpenAI: embeddings + chat) — required
      - key: OPENAI_API_KEY
        sync: false
      # Email (SMTP) — required at boot (ENV.fetch in production.rb)
      - key: SMTP_ADDRESS
        sync: false
      - key: SMTP_DOMAIN
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      # Admin lockup gate
      - key: LOCKUP_CODEWORD
        sync: false
      # Optional: analytics (guarded — safe to omit)
      - key: GOOGLE_ANALYTICS_TRACKING_ID
        sync: false
